<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Deutsche Bundesländer Explorer</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="app-shell">
    <section class="search-panel">
      <p class="eyebrow">JavaScript-Projekt</p>
      <h1>Deutsche Bundesländer Explorer</h1>
      <p class="lead">
        Suche nach deutschen Bundesländern, sieh dir grundlegende Informationen an, betrachte die Flaggen und speichere Favoriten.
      </p>

      <form id="searchForm" class="search-form">
        <input
          type="text"
          id="searchInput"
          placeholder="Nach einem Bundesland suchen"
          aria-label="Nach einem Bundesland suchen"
        />
        <button type="submit">Suchen</button>
      </form>

      <div class="controls">
        <select id="regionFilter" aria-label="Nach Region filtern">
          <option value="all">Alle Regionen</option>
          <option value="Nord">Nord</option>
          <option value="Süd">Süd</option>
          <option value="Ost">Ost</option>
          <option value="West">West</option>
        </select>

        <button id="showFavorites" type="button" class="secondary-btn">
          Favoriten anzeigen
        </button>
      </div>

      <p id="statusMessage" class="status-message" role="status" aria-live="polite"></p>
    </section>

    <section>
      <div id="results" class="results-grid"></div>
    </section>
  </main>

  <template id="stateCardTemplate">
    <article class="state-card">
      <img class="state-image" alt="" />
      <div class="state-body">
        <div class="state-top">
          <h2></h2>
          <button class="favorite-btn" type="button">☆</button>
        </div>
        <p class="state-region"></p>
        <ul class="state-details"></ul>
      </div>
    </article>
  </template>

  <script src="script.js"></script>
</body>
</html>
