<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Simple Store</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="site-header">
    <div class="container header-content">
      <h1 class="logo">Simple Store</h1>

      <button id="cartToggleBtn" class="cart-toggle-btn">
        Cart (<span id="cartCount">0</span>)
      </button>
      <!--
        This button now does two jobs:
        1. shows how many total items are in the cart
        2. opens/closes the cart panel
      -->
    </div>
  </header>

  <main class="main-content container">
    <section class="hero">
      <h2>Featured Products</h2>
      <p>Browse products and add them to your cart.</p>
    </section>

    <section class="products-section">
      <h3>Products</h3>

      <div id="productList" class="product-grid">
        <!-- JavaScript renders products here -->
      </div>
    </section>
  </main>

  <!--
    The cart is now separate from the main page layout.
    It behaves like a side panel / drawer.
  -->
  <aside class="cart-panel hidden" id="cartSection">
    <div class="cart-panel-header">
      <h3>Your Cart</h3>
      <button id="closeCartBtn" class="close-cart-btn">×</button>
      <!--
        This button closes the cart panel.
        A button is the correct element because it performs an action.
      -->
    </div>

    <div id="cartItems" class="cart-items">
      <p class="empty-cart-message">Your cart is empty.</p>
    </div>

    <div class="cart-footer">
      <p class="cart-total">
        Total: $<span id="cartTotal">0.00</span>
      </p>
      <button id="clearCartBtn" class="clear-cart-btn">Clear Cart</button>
    </div>
  </aside>

  <!--
    Overlay darkens the page behind the cart.
    Clicking it can also close the cart.
  -->
  <div id="overlay" class="overlay hidden"></div>

  <script src="script.js"></script>
</body>
</html>
