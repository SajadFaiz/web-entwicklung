<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  
  <title>Online Shopping Landing Page-HTML,CSS </title>
</head>

<body>
  <!--Header Section-->
  <header>
    <div>
      <h4>Online Shopping</h4>
    </div>
    <nav class="nav-bar">
      <a href="#">Herren</a>
      <a href="#">Frauen</a>
      <a href="#">Haushalt</a>
      <a href="#">Multimedia</a>
      <a href="#">Sport</a>
    </nav>

    <div class="search-bar">
      <input placeholder="Suchen" class="search-input">
      <span class="material-symbols-outlined search-icon">search</span>
    </div>

    <div class="action-bar">
      <div class="action-container">
        <span class="material-symbols-outlined action-icon">favorite</span>
        <span class="action-name">Wunschliste</span>
      </div>

      <div class="action-container">
        <span class="material-symbols-outlined action-icon">shopping_bag</span>
        <span class="action-name">Bag</span>
      </div>
    </div>
  </header>  
  
  <main>
    <div class="banner-container">
      <img src="Images/banner.avif" class="banner-image">
    </div>
    <div class="heading">Unsere Kategorien</div>

    <div class="categorie-container">
      <a href="#"><img src="Images/categories/Frauen.avif" class="image-categorie"></a>  
      <a href="#"><img src="Images/categories/Herren.webp" class="image-categorie"></a>  
      <a href="#"><img src="Images/categories/Multimedia.avif" class="image-categorie"></a>  
      <a href="#"><img src="Images/categories/Haushalt.avif" class="image-categorie"></a>  
      <a href="#"><img src="Images/categories/sport.avif" class="image-categorie"></a>  
    </div>
  </main>

  <footer>
    <div class="footer-container">
      <div class="footer-info">
        <h3 class="h3">Shoppen</h3>
        <a href="#">Herren</a>
        <a href="#">Frauen</a>
        <a href="#">Haushalt</a>
        <a href="#">Multimedia</a>
        <a href="#">Sport</a>
      </div>

      <div class="footer-info">
        <h3 class="h3">Info</h3>
        <a href="#">Kontakt</a>
        <a href="#">Adresse</a>
        <a href="#">Terms of Use</a>
        <a href="#">FAQ</a>
        <a href="#">Support</a>
      </div>

      <div class="footer-info">
        <h3 class="h3">Links</h3>
        <a href="#">Blog</a>
        <a href="#">Karriere</a>
        <a href="#">Bewerbung</a>
      </div>
    </div>
    <hr>
    <div class="copyright">© 2026 www.OEShopping.com. All rights reserved.</div>
  </footer>
  
</body>
</html>
